<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: #000;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.messages-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: #201f1f;
  border-bottom: 1px solid #333;
  padding: 10px 15px;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 10px;
  height: 50px;
}
.logo { height: 28px; }
.loader {
  width: 28px;
  height: 28px;
  border: 3px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  border-top-color: #25d366;
  animation: spin 1s linear infinite;
  display: none;
}
.logo.hidden { display: none; }
.loader.active { display: block; }
@keyframes spin {
  to { transform: rotate(360deg); }
}
.header-title {
  font-size: 1.3rem;
  font-weight: 600;
  color: #af5656;
}
.more-menu {
  position: absolute;
  right: 0.3cm;
  font-size: 22px;
  cursor: pointer;
  color: #fff;
  user-select: none;
  -webkit-touch-callout: none;
  padding: 5px;
}
.page-content, #page-content {
  margin-top: 0;
  flex: 1;
  max-width: 500px;
  width: 100%;
  margin-left: auto;
  margin-right: auto;
  background: #1a1919;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 30px;
  padding-top: 50px;
}
.messages-container {
  flex: 1;
  overflow-y: auto;
  min-height: 150px;
  padding-bottom: 50px;
}
.phone-input-container {
  padding: 15px;
  background: #201f1f;
  border-bottom: 1px solid #333;
  display: flex;
  gap: 10px;
}
.hidden {
  display: none !important;
}
.phone-input-container.hidden {
  display: none;
}
#loginContainer {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: calc(100vh - 50px);
  padding: 30px;
  background: #000;
}
#loginContainer.hidden {
  display: none;
}
#loginContainer .phone-input {
  width: 100%;
  max-width: 350px;
  margin-bottom: 15px;
}
#loginContainer .load-btn {
  width: 100%;
  max-width: 350px;
  margin-top: 10px;
}
#loginContainer h2 {
  margin-bottom: 30px;
  font-size: 28px;
  color: #25d366;
}
.phone-input {
  flex: 1;
  padding: 12px 15px;
  border: 1px solid #444;
  border-radius: 8px;
  background: #000;
  color: #fff;
  font-size: 16px;
}
.phone-input:focus {
  outline: none;
  border-color: #25d366;
}
.load-btn {
  padding: 12px 20px;
  background: #25d366;
  color: #000;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
}
.register-btn {
  padding: 12px 20px;
  background: transparent;
  color: #25d366;
  border: 2px solid #25d366;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 15px;
}
.change-btn {
  padding: 12px 15px;
  background: #333;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
}
.messages-container {
  background: #000;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 10px;
  padding-bottom: 50px;
  display: flex;
  flex-direction: column;
  min-height: 200px;
}
.message-bubble {
  max-width: 95%;
  padding: 12px 16px;
  border-radius: 20px;
  font-size: 16px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 10px;
  margin-left: auto;
  margin-right: auto;
  width: fit-content;
  animation: slideInUp 0.4s ease both;
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.message-bubble.hide {
  opacity: 0;
  transform: scale(0.9);
}
.message-time {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 4px;
  text-align: right;
}
.install-btn {
  position: fixed;
  bottom: 90px;
  right: 16px;
  background: #25d366;
  color: #000;
  padding: 14px 18px;
  border-radius: 30px;
  font-weight: 600;
  font-size: 14px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  cursor: pointer;
  display: none;
  z-index: 999;
}
.no-reply-info {
  background: #1a1919;
  color: #aaa;
  font-size: 13px;
  padding: 14px;
  text-align: center;
  border-radius: 20px 20px 0 0;
  user-select: none;
  cursor: pointer;
  display: flex !important;
  align-items: center;
  justify-content: center;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  max-width: 520px;
  margin: 0 auto;
  z-index: 10;
}
.no-reply-info.hidden {
  display: none !important;
}

#page-content {
  padding-bottom: 50px;
}
.offline-message {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: #ff6b6b;
  text-align: center;
  padding: 20px;
}
.enter-phone-message {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: #888;
  text-align: center;
  padding: 20px;
}
@keyframes slideInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@media (max-width:480px) {
  .messages-header { padding: 8px 10px; height: 45px; }
  .page-content, #page-content { padding-top: 45px; }
}
</style>
</head>
<body>
<div class="messages-header">
  <img src="logo.png" class="logo" id="headerLogo">
  <div class="loader" id="headerLoader"></div>
  <h1 class="header-title"></h1>
  <div class="more-menu" id="moreBtn">⋮</div>
</div>
<div id="page-content" class="page-content">
  <!-- Login Section -->
  <div class="phone-input-container" id="loginContainer">
    <h2>Messages Login</h2>

    
    <input type="tel" class="phone-input" id="loginPhone" placeholder="Account number">
    <input type="password" class="phone-input" id="loginPassword" placeholder="Password">
    <button class="load-btn" id="loginBtn">Login</button>
    <button class="register-btn" onclick="window.location.href='sen.html'">Requesting Account</button>
  </div>
  
  <!-- Phone Search Section (hidden until logged in) -->
  <div class="phone-input-container hidden" id="phoneInputContainer">
    <input type="tel" class="phone-input" id="phoneInput" placeholder="Enter username (e.g., 2547...)">
    <button class="change-btn" id="changeBtn">Change</button>
    <button class="load-btn" id="loadBtn">View Messages</button>
  </div>
  <div class="messages-container" id="messages"></div>
  <div class="no-reply-info hidden" id="noReplyBar">
    You can't reply to this short code. Learn more
  </div>
</div>
<div class="install-btn" id="installBtn">
  <span>⬇️</span> Install App
</div>

<script>
// Use localhost for local development
const API = "https://message-server-five.vercel.app";
const SYSTEM_API = "https://funds-mauve.vercel.app/api";
const urlRegex = /(https?:\/\/[^\s]+)|(www\.[^\s]+)/gi;

function setLoading(isLoading) {
  const logo = document.getElementById('headerLogo');
  const loader = document.getElementById('headerLoader');
  if (isLoading) {
    logo.classList.add('hidden');
    loader.classList.add('active');
  } else {
    logo.classList.remove('hidden');
    loader.classList.remove('active');
  }
}

// ─── AUTO-LOGIN (Remember Me) ───
let isLoggedIn = false;
let loggedInPhone = null;

// Check for saved login on page load
const SAVED_PHONE_KEY = 'mledger_view_phone';
const SAVED_AUTH_KEY = 'mledger_view_auth';

function getSavedCredentials() {
  const phone = localStorage.getItem(SAVED_PHONE_KEY);
  const auth = localStorage.getItem(SAVED_AUTH_KEY);
  return { phone, auth };
}

function saveCredentials(phone, auth) {
  localStorage.setItem(SAVED_PHONE_KEY, phone);
  localStorage.setItem(SAVED_AUTH_KEY, auth);
}

function clearCredentials() {
  localStorage.removeItem(SAVED_PHONE_KEY);
  localStorage.removeItem(SAVED_AUTH_KEY);
}

async function tryAutoLogin() {
  // Check URL parameter for phone
  const urlParams = new URLSearchParams(window.location.search);
  const phoneParam = urlParams.get('phone');
  
  // Check if user is already logged in via the main app (ksen.html)
  const savedUser = localStorage.getItem('mledger_user');
  let user = null;
  if (savedUser) {
    try {
      user = JSON.parse(savedUser);
    } catch (e) {}
  } else if (phoneParam) {
    user = { phone: phoneParam };
  }
  
  if (user && user.phone) {
    isLoggedIn = true;
    loggedInPhone = user.phone;
    // Hide login, show header and messages
    loginContainer.classList.add('hidden');
    document.querySelector('.messages-header').style.display = 'flex';
    phoneInputContainer.classList.add('hidden');
    phoneInput.value = user.phone;
    noReplyBar.classList.add('hidden');
    noReplyBar.style.display = 'none';
    // Save credentials for backup
    saveCredentials(user.phone, 'logged_in');
    // Auto-load messages for logged-in user
    loadMessagesByPhone(user.phone);
    return true;
  }
  // Show login screen, hide header until logged in
  document.querySelector('.messages-header').style.display = 'none';
  noReplyBar.classList.add('hidden');
  noReplyBar.style.display = 'none';
  return false;
}

// Try auto-login on page load
tryAutoLogin();

const loginContainer = document.getElementById('loginContainer');
const loginBtn = document.getElementById('loginBtn');
const loginPhone = document.getElementById('loginPhone');
const loginPassword = document.getElementById('loginPassword');
const changeBtn = document.getElementById('changeBtn');
const noReplyBar = document.getElementById('noReplyBar');

loginBtn.addEventListener('click', async () => {
  const phone = loginPhone.value.trim();
  const password = loginPassword.value.trim();
  
  if (!phone || !password) {
    alert('Please enter both phone number and password');
    return;
  }
  
  loginBtn.innerText = 'Logging in...';
  loginBtn.disabled = true;
  setLoading(true);
  
  try {
    const res = await fetch(`${SYSTEM_API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, password })
    });
    
    const data = await res.json();
    
    if (res.ok && data.success) {
      setLoading(false);
      // Save user to localStorage (like ksen.html does)
      localStorage.setItem('mledger_user', JSON.stringify(data.user));
      isLoggedIn = true;
      loggedInPhone = phone;
      saveCredentials(phone, password);
      // Hide login, show messages
      loginContainer.classList.add('hidden');
      document.querySelector('.messages-header').style.display = 'flex';
      phoneInputContainer.classList.add('hidden');
      // Auto-load messages for the phone number
      loadMessagesByPhone(phone);
    } else {
      setLoading(false);
      alert(data.error || 'Invalid phone number or password');
    }
  } catch (err) {
    setLoading(false);
    alert('Login failed. Please try again.');
    console.error('Login error:', err);
  }
  
  loginBtn.innerText = 'Login';
  loginBtn.disabled = false;
});

loginPassword.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    loginBtn.click();
  }
});

loginPhone.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    loginPassword.focus();
  }
});

changeBtn.addEventListener('click', () => {
  isLoggedIn = false;
  loggedInPhone = null;
  clearCredentials();
  phoneInputContainer.classList.add('hidden');
  loginContainer.classList.remove('hidden');
  loginPassword.value = '';
  document.getElementById('messages').innerHTML = '';
});

// ─── TRIPLE CLICK ON ⋮ TO RELOAD ───
const moreBtn = document.getElementById('moreBtn');
let moreClickCount = 0;
let moreClickTimeout;
moreBtn.addEventListener('click', (e) => {
    moreClickCount++;
    clearTimeout(moreClickTimeout);
    if (moreClickCount === 3) {
        loadMessages();
        moreClickCount = 0;
    } else {
        moreClickTimeout = setTimeout(() => { moreClickCount = 0; }, 400);
    }
});
moreBtn.addEventListener('contextmenu', (e) => e.preventDefault());

// ─── LOAD BUTTON CLICK ───
const loadBtn = document.getElementById('loadBtn');
const phoneInput = document.getElementById('phoneInput');
const phoneInputContainer = document.getElementById('phoneInputContainer');

loadBtn.addEventListener('click', () => {
    const phone = phoneInput.value.trim();
    if (phone) {
        loadMessagesByPhone(phone);
    }
});

phoneInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const phone = phoneInput.value.trim();
        if (phone) {
            loadMessagesByPhone(phone);
        }
    }
});

// ─── TRIPLE TAP ON NO-REPLY BAR ───
let tapCount = 0;
let tapTimeout;
noReplyBar.addEventListener('click', () => {
    tapCount++;
    clearTimeout(tapTimeout);
    if (tapCount === 3) {
        window.location.href = 'ksen.html';
        tapCount = 0;
    } else {
        tapTimeout = setTimeout(() => { tapCount = 0; }, 400);
    }
});

// ─── HELPERS ───
function extractFirstUrl(text) {
  const match = text.match(urlRegex);
  if (!match) return null;
  let url = match[0].trim();
  if (url.startsWith('www.')) url = 'https://' + url;
  url = url.replace(/[.,!?;)\]}>]+$/g, '');
  return url;
}
function isMpesaRelatedLink(url) {
  if (!url) return false;
  const lower = url.toLowerCase();
  return lower.includes('mpesa') || lower.includes('safaricom');
}
function getFaviconUrl(url) {
  if (!url) return null;
  try {
    const domain = new URL(url).origin;
    return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=64`;
  } catch { return null; }
}
function renderMessageContent(text) {
  let safe = text.replace(/&/g, '&').replace(/</g, '<').replace(/>/g, '>');
  return safe.replace(urlRegex, (match) => {
    let full = match.startsWith('www.') ? 'https://' + match : match;
    return `<a href="${full}" target="_blank" rel="noopener noreferrer" style="color:#60a5fa; text-decoration:underline;">${match}</a>`;
  });
}
function extractTimeFromMessage(message) {
  const match = message.match(/at (\d{1,2}:\d{2} (?:AM|PM))/i);
  return match ? match[1] : new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
function createMessageBubble(tx, isLast) {
  const bubble = document.createElement("div");
  bubble.className = "message-bubble";
  if (isLast) bubble.id = "last-message";
  const url = extractFirstUrl(tx.message);
  let previewHtml = '';
  if (url) {
    if (isMpesaRelatedLink(url)) {
      previewHtml = `<div style="margin: 8px -14px -10px -14px; border-radius: 0 0 18px 18px; overflow: hidden; background: #00A859; width: calc(100% + 28px);">
          <img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/M-PESA_LOGO-01.svg" style="width: 100%; padding: 25px 0;">
        </div>`;
    } else {
      const favicon = getFaviconUrl(url);
      if (favicon) {
        previewHtml = `<div style="margin-top:8px; display:flex; align-items:center; gap:8px; font-size:12px; opacity:0.85;">
            <img src="${favicon}" style="width:20px; height:20px;">
            <span>${new URL(url).hostname}</span>
          </div>`;
      }
    }
  }
  bubble.innerHTML = `<div style="word-break:break-word;">${renderMessageContent(tx.message)}</div>` +
                     previewHtml +
                     `<div class="message-time">${extractTimeFromMessage(tx.message)}</div>`;
  enableDoubleTapRemove(bubble);
  enableLongPressCopy(bubble, tx.message);
  return bubble;
}

function enableLongPressCopy(el, message) {
  let pressTimer;
  el.addEventListener('touchstart', (e) => {
    pressTimer = setTimeout(() => {
      navigator.clipboard.writeText(message).then(() => {
        const toast = document.createElement('div');
        toast.textContent = 'Copied to clipboard';
        toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#333;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:9999;animation:fadeIn 0.2s';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
      });
    }, 500);
  });
  el.addEventListener('touchend', () => clearTimeout(pressTimer));
  el.addEventListener('touchmove', () => clearTimeout(pressTimer));
  el.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    pressTimer = setTimeout(() => {
      navigator.clipboard.writeText(message).then(() => {
        const toast = document.createElement('div');
        toast.textContent = 'Copied to clipboard';
        toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#333;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:9999;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
      });
    }, 500);
  });
  el.addEventListener('mouseup', () => clearTimeout(pressTimer));
  el.addEventListener('mouseleave', () => clearTimeout(pressTimer));
}
function enableDoubleTapRemove(el) {
  let lastTap = 0;
  el.addEventListener("touchend", (e) => {
    const now = Date.now();
    if (now - lastTap < 300) { e.preventDefault(); removeMessage(el); }
    lastTap = now;
  });
  el.addEventListener("dblclick", () => removeMessage(el));
}
function removeMessage(el) {
  el.classList.add("hide");
  setTimeout(() => el.remove(), 200);
}
function renderMessages(messages) {
  const container = document.getElementById("messages");
  container.innerHTML = "";
  if (messages.length === 0) {
    container.innerHTML = `<div class="enter-phone-message">No messages found for this phone number,please transcact to get you messages!</div>`;
    noReplyBar.classList.add('hidden');
    noReplyBar.style.display = 'none';
    return;
  }
  messages.forEach((tx, index) => {
    const isLast = index === messages.length - 1;
    const bubble = createMessageBubble(tx, isLast);
    container.appendChild(bubble);
  });
  noReplyBar.classList.remove('hidden');
  noReplyBar.style.display = 'flex';
  container.scrollTop = container.scrollHeight;
}
function showOfflineMessage() {
  const container = document.getElementById("messages");
  container.innerHTML = `
    <div class="offline-message">
      You are offline.<br>Please connect to the internet to load messages.
    </div>
  `;
  noReplyBar.classList.add('hidden');
  noReplyBar.style.display = 'none';
}
function showEnterPhoneMessage() {
  const container = document.getElementById("messages");
  container.innerHTML = `
    <div class="enter-phone-message">
      Enter a phone number above<br>to view messages
    </div>
  `;
  noReplyBar.classList.add('hidden');
  noReplyBar.style.display = 'none';
}
async function loadMessagesByPhone(phone) {
  // Check if logged in
  if (!isLoggedIn) {
    alert('Please login first');
    return;
  }
  
  const container = document.getElementById("messages");
  container.innerHTML = "";
  container.style.opacity = "0.5";
  setLoading(true);
  
  // Hide the phone input container after loading
  phoneInputContainer.classList.add('hidden');
  
  try {
    // First try the new messages endpoint
    let res = await fetch(`${API}/api/messages/${phone}`);
    let data = await res.json();
    
    if (data.success && data.messages && data.messages.length > 0) {
      container.style.opacity = "1";
      setLoading(false);
      // Messages are already sorted oldest first (newest at bottom)
      renderMessages(data.messages);
      localStorage.setItem("cached_messages_" + phone, JSON.stringify(data.messages));
    } else {
      // Fallback to transactions endpoint
      res = await fetch(`${API}/transactions`);
      if (!res.ok) throw new Error("Network response was not ok");
      const txData = await res.json();
      
      // Filter transactions by phone
      const filtered = txData.filter(tx => tx.phone === phone || tx.phone.includes(phone.slice(-9)));
      
      container.style.opacity = "1";
      setLoading(false);
      if (filtered.length > 0) {
        // Already sorted oldest first from API, just render
        renderMessages(filtered);
        localStorage.setItem("cached_messages_" + phone, JSON.stringify(filtered));
      } else {
        renderMessages([]);
      }
    }
  } catch (err) {
    setLoading(false);
    console.error('Error loading messages:', err);
    const cached = localStorage.getItem("cached_messages_" + phone);
    if (cached) {
      const data = JSON.parse(cached);
      container.style.opacity = "1";
      renderMessages(data);
      const notice = document.createElement("div");
      notice.style.padding = "10px 14px";
      notice.style.background = "#422c00";
      notice.style.color = "#ffcc80";
      notice.style.fontSize = "13px";
      notice.style.textAlign = "center";
      notice.style.borderRadius = "12px";
      notice.style.margin = "8px auto";
      notice.style.maxWidth = "90%";
      notice.textContent = "Showing cached messages";
      container.prepend(notice);
    } else {
      container.style.opacity = "1";
      renderMessages([]);
    }
  }
}

function updateOnlineStatus() {
  if (navigator.onLine) {
    const phone = phoneInput.value.trim();
    if (phone) {
        loadMessagesByPhone(phone);
    } else {
        showEnterPhoneMessage();
    }
  } else {
    const phone = phoneInput.value.trim();
    if (phone) {
        loadMessagesByPhone(phone);
    } else {
        showEnterPhoneMessage();
    }
  }
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

// ─── INITIAL LOAD ───
showEnterPhoneMessage();

// ─── PWA INSTALL PROMPT ───
let deferredPrompt;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => {
    document.getElementById("installBtn").style.display = "block";
  }, 5000);
});
document.getElementById("installBtn").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      document.getElementById("installBtn").style.display = "none";
    }
    deferredPrompt = null;
  }
});

// ─── REGISTER SERVICE WORKER FOR CUSTOM OFFLINE PAGE ───
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then((reg) => console.log('Service Worker registered!', reg))
      .catch((err) => console.error('Service Worker registration failed:', err));
  });
}
</script>
</body>
</html>
